<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>命運情書 · Love Letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+TC:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-deeper:#1a0509;
    --bg-deep:#330c12;
    --wine:#5c1320;
    --wine-light:#7a1c2b;
    --parchment:#f3e6c8;
    --parchment-dark:#e3cd9c;
    --ink:#2c1c12;
    --ink-soft:#5a4630;
    --gold:#c8a13d;
    --gold-light:#e9cd7e;
    --gold-deep:#8a6315;
    --danger:#8b2c2c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(201,164,80,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.55), transparent 60%),
      linear-gradient(160deg, var(--bg-deep), var(--bg-deeper) 70%);
    font-family:'EB Garamond', 'Noto Serif TC', serif;
    color:var(--parchment);
    display:flex;
    justify-content:center;
    padding:18px 12px 60px;
  }
  .display{font-family:'Cormorant Garamond','Noto Serif TC',serif;}
  #app{width:100%;max-width:560px;}

  .glow-wrap{position:relative;text-align:center;margin-bottom:18px;padding-top:6px;}
  .glow{
    position:absolute;left:50%;top:6px;transform:translateX(-50%);
    width:240px;height:120px;border-radius:50%;
    background:radial-gradient(circle, rgba(232,205,126,0.35), transparent 70%);
    filter:blur(6px);
    animation:flicker 4.5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes flicker{0%,100%{opacity:.55;}50%{opacity:1;}}
  h1.title{
    position:relative;z-index:1;
    font-family:'Cormorant Garamond','Noto Serif TC',serif;
    font-weight:700;
    font-size:34px;
    letter-spacing:2px;
    color:var(--gold-light);
    margin:0;
    text-shadow:0 2px 14px rgba(232,205,126,0.35);
  }
  .subtitle{position:relative;z-index:1;color:var(--parchment-dark);font-style:italic;font-size:14px;margin-top:4px;opacity:.85;}

  .panel{
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.12)), var(--wine);
    border:1px solid rgba(201,164,80,0.45);
    border-radius:10px;
    padding:18px 16px;
    margin-bottom:14px;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .panel h2{
    font-family:'Cormorant Garamond','Noto Serif TC',serif;
    font-size:19px;color:var(--gold-light);margin:0 0 10px;letter-spacing:1px;
    border-bottom:1px solid rgba(201,164,80,0.3);padding-bottom:8px;
  }
  label{display:block;font-size:13px;color:var(--parchment-dark);margin-bottom:5px;letter-spacing:.5px;}
  input[type=text]{
    width:100%;padding:10px 12px;border-radius:6px;border:1px solid rgba(201,164,80,0.5);
    background:rgba(243,230,200,0.95);color:var(--ink);font-family:'EB Garamond',serif;font-size:16px;
    margin-bottom:12px;
  }
  input[type=text]:focus{outline:2px solid var(--gold-light);}

  .btn{
    display:inline-block;cursor:pointer;border:1px solid var(--gold-deep);
    background:linear-gradient(180deg, var(--parchment-dark), var(--parchment));
    color:var(--ink);font-family:'Noto Serif TC',serif;font-weight:700;font-size:14px;
    padding:10px 18px;border-radius:6px;text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
    transition:transform .12s ease;
    user-select:none;
  }
  .btn:active{transform:scale(0.96);}
  .btn.secondary{background:transparent;color:var(--parchment-dark);border-color:rgba(201,164,80,0.4);box-shadow:none;}
  .btn.full{display:block;width:100%;}
  .btn:disabled, .btn.disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}

  .seal-wrap{display:flex;justify-content:center;margin:18px 0;}
  .seal{
    width:118px;height:118px;border-radius:50%;
    background:radial-gradient(circle at 35% 28%, var(--gold-light), var(--gold) 55%, var(--gold-deep) 100%);
    border:2px solid #4a3408;
    box-shadow:0 8px 16px rgba(0,0,0,0.5), inset 0 -6px 12px rgba(0,0,0,0.3), inset 0 5px 9px rgba(255,255,255,0.3);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#3a2300;font-family:'Cormorant Garamond',serif;font-weight:700;letter-spacing:1px;
    cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;
    text-align:center;line-height:1.15;
  }
  .seal span{font-size:14px;}
  .seal small{font-size:10px;opacity:.75;font-weight:500;}
  .seal:active{transform:scale(0.9);box-shadow:0 2px 6px rgba(0,0,0,0.5), inset 0 6px 10px rgba(0,0,0,0.4);}
  .seal.disabled{filter:grayscale(0.6) brightness(0.7);cursor:not-allowed;}

  .room-code{
    background:var(--parchment);color:var(--ink);border-radius:8px;
    padding:14px;text-align:center;letter-spacing:6px;font-size:30px;
    font-family:'Cormorant Garamond',serif;font-weight:700;
    border:1px dashed var(--gold-deep);margin-bottom:10px;
  }

  .player-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:9px 10px;border-radius:6px;margin-bottom:6px;
    background:rgba(0,0,0,0.18);border:1px solid rgba(201,164,80,0.18);
    font-size:14px;
  }
  .player-row.active{border-color:var(--gold-light);background:rgba(201,164,80,0.16);}
  .player-row.dead{opacity:0.45;text-decoration:line-through;}
  .tag{font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px;letter-spacing:.5px;}
  .tag.turn{background:var(--gold);color:#2c1c00;}
  .tag.prot{background:#355c3a;color:#dfffe6;}
  .tag.host{background:#3a3a55;color:#dde0ff;}
  .tokens{display:flex;gap:3px;}
  .token-dot{width:9px;height:9px;border-radius:50%;background:var(--gold-light);box-shadow:0 0 3px rgba(232,205,126,0.7);}

  .card{
    position:relative;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0 2px, transparent 2px 4px),
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.5), transparent 40%),
      var(--parchment);
    color:var(--ink);
    border-radius:8px;border:1px solid var(--gold-deep);
    padding:14px 12px 10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.35);
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-3px);}
  .card.selected{outline:3px solid var(--gold-light);transform:translateY(-4px);}
  .card.locked{cursor:not-allowed;opacity:0.5;}
  .card .roman{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--gold-deep);}
  .card .cname{font-family:'Noto Serif TC',serif;font-weight:700;font-size:16px;margin:2px 0 4px;}
  .card .cdesc{font-size:12px;font-style:italic;color:var(--ink-soft);line-height:1.4;}
  .cards-row{display:flex;gap:10px;}
  .cards-row .card{flex:1;}

  .small-card{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:34px;border-radius:4px;background:var(--parchment-dark);
    color:var(--ink);font-weight:700;font-size:12px;border:1px solid var(--gold-deep);
    margin-right:4px;margin-bottom:4px;
  }
  .discard-row{display:flex;flex-wrap:wrap;margin-top:4px;}

  .target-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
  .pill{
    padding:8px 14px;border-radius:20px;background:rgba(243,230,200,0.12);
    border:1px solid rgba(201,164,80,0.5);color:var(--parchment);font-size:13px;cursor:pointer;
  }
  .pill.sel{background:var(--gold);color:#2c1c00;border-color:var(--gold-light);font-weight:700;}
  .guess-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
  .guess-pill{
    width:auto;padding:7px 10px;border-radius:6px;font-size:12px;cursor:pointer;
    background:rgba(243,230,200,0.1);border:1px solid rgba(201,164,80,0.4);color:var(--parchment);
  }
  .guess-pill.sel{background:var(--gold);color:#2c1c00;font-weight:700;}

  .log-box{
    background:rgba(0,0,0,0.22);border-radius:8px;padding:10px 12px;max-height:160px;overflow-y:auto;
    font-size:12.5px;color:var(--parchment-dark);line-height:1.6;
  }
  .log-box div{padding:2px 0;border-bottom:1px dashed rgba(201,164,80,0.12);}
  .highlight-banner{
    background:linear-gradient(180deg, rgba(201,164,80,0.18), rgba(201,164,80,0.06));
    border:1px solid rgba(201,164,80,0.55);border-radius:8px;
    padding:12px 14px;margin-bottom:14px;
    font-size:15px;line-height:1.6;color:var(--parchment);
  }
  .highlight-banner .eyebrow{font-size:11px;letter-spacing:1px;color:var(--gold-light);text-transform:uppercase;margin-bottom:4px;}
  .highlight-banner .prev{opacity:0.55;font-size:13px;margin-top:4px;}
  .hint{font-size:12px;color:var(--parchment-dark);opacity:.8;margin-top:6px;}
  .center-text{text-align:center;}
  .mt8{margin-top:8px;}
  .mt14{margin-top:14px;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px;
  }
  .modal-box{
    background:var(--parchment);color:var(--ink);border-radius:10px;padding:20px;max-width:420px;width:100%;
    max-height:80vh;overflow-y:auto;border:2px solid var(--gold-deep);
  }
  .modal-box h3{font-family:'Cormorant Garamond',serif;margin-top:0;color:var(--ink);}
  .rule-item{margin-bottom:12px;border-bottom:1px solid rgba(0,0,0,0.1);padding-bottom:8px;}
  .rule-item b{color:var(--gold-deep);}
  .top-link{position:fixed;top:10px;right:14px;font-size:12px;color:var(--parchment-dark);cursor:pointer;text-decoration:underline;z-index:30;}

  .champion-banner{
    text-align:center;font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold-light);
    padding:14px 0;text-shadow:0 2px 12px rgba(232,205,126,0.4);
  }
  @media (max-width:380px){
    h1.title{font-size:27px;}
    .seal{width:100px;height:100px;}
  }
</style>
</head>
<body>
<div class="top-link" onclick="toggleRules()">規則 ‣</div>
<div class="top-link" id="leaveLink" style="left:14px;right:auto;display:none;" onclick="toggleRoomMenu()">‣ 房間選項</div>
<div id="app"></div>

<script>
/* ---------------- Firebase setup ----------------
   Fill these in with your own Firebase project's web config
   (Firebase console → Project settings → General → Your apps → Web app → SDK setup).
   These values are not secret — Firebase apps are secured via Realtime Database
   rules, not by hiding the config. See the setup notes shared alongside this file. */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyD96EgkUG-4ibVF658eNbTsQG3j6-saH_M",
  authDomain: "loveletter-b1161.firebaseapp.com",
  databaseURL: "https://loveletter-b1161-default-rtdb.firebaseio.com",
  projectId: "loveletter-b1161",
  storageBucket: "loveletter-b1161.firebasestorage.app",
  messagingSenderId: "88339333761",
  appId: "1:88339333761:web:e8d3326fb7e588861d8380",
  measurementId: "G-R4CJG9QZCR"
};
const FIREBASE_READY = FIREBASE_CONFIG.apiKey !== "REPLACE_ME";
let db=null;
if(FIREBASE_READY){
  firebase.initializeApp(FIREBASE_CONFIG);
  db=firebase.database();
}

/* ---------------- Card definitions ---------------- */
const CARDS = {
  1:{name:'衛兵',roman:'I',count:5,desc:'指定一名玩家並猜測其手牌(不可猜「衛兵」)。猜中則該玩家立即出局。'},
  2:{name:'神父',roman:'II',count:2,desc:'查看任一玩家的手牌內容。'},
  3:{name:'男爵',roman:'III',count:2,desc:'與任一玩家秘密比較手牌,點數較小的一方出局。'},
  4:{name:'侍女',roman:'IV',count:2,desc:'保護自己,直到你的下一回合開始前不會被其他效果指定。'},
  5:{name:'王子',roman:'V',count:2,desc:'指定任一玩家(包括自己)棄掉手牌,並重新抽一張新牌。'},
  6:{name:'國王',roman:'VI',count:1,desc:'與任一玩家交換手牌。'},
  7:{name:'伯爵夫人',roman:'VII',count:1,desc:'若同時持有「國王」或「王子」,必須棄掉此牌。單獨棄掉沒有其他效果。'},
  8:{name:'公主',roman:'VIII',count:1,desc:'萬萬不可棄掉這張牌——無論原因,棄掉公主就立即出局。'}
};
function cardName(v){return CARDS[v]?CARDS[v].name:'?';}
function cardRoman(v){return CARDS[v]?CARDS[v].roman:'?';}
function cardDesc(v){return CARDS[v]?CARDS[v].desc:'';}

/* ---------------- Global session ---------------- */
let roomCode=null, myId=null, myName='';
let state=null;
let localUI={stage:null, selectedCard:null, targetId:null, guess:null};
let rulesOpen=false;
let roomMenuOpen=false;
function toggleRoomMenu(){ roomMenuOpen=!roomMenuOpen; render(); }
let notice=null; // {title, body}

function showNotice(body, title){
  notice={title: title||'提醒', body};
  render();
}
function closeNotice(){
  notice=null;
  render();
}

function genId(){
  if(window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
  return 'id-'+Math.random().toString(36).slice(2)+Date.now();
}
function genRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<4;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function clone(o){return JSON.parse(JSON.stringify(o));}
function sumArr(a){return a.reduce((s,v)=>s+v,0);}

/* ---------------- Deck / round setup ---------------- */
function buildDeck(){
  let d=[];
  Object.keys(CARDS).forEach(k=>{
    const v=Number(k);
    for(let i=0;i<CARDS[v].count;i++) d.push(v);
  });
  for(let i=d.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [d[i],d[j]]=[d[j],d[i]];
  }
  return d;
}
function startRound(st){
  st.players.forEach(p=>{p.hand=[];p.discardPile=[];p.alive=true;p.protected=false;});
  const deck=buildDeck();
  st.removedCard=deck.pop();
  st.faceUpRemoved = st.players.length===2 ? [deck.pop(),deck.pop(),deck.pop()] : [];
  st.players.forEach(p=>{p.hand=[deck.pop()];});
  st.deck=deck;
  st.startingPlayerIndex=(st.roundNumber-1) % st.players.length;
  st.currentPlayerId=st.players[st.startingPlayerIndex].id;
  st.log=[`第 ${st.roundNumber} 輪開始,由 ${st.players[st.startingPlayerIndex].name} 先出牌。`];
  st.status='playing';
  st.roundWinners=[];
}

/* ---------------- Storage helpers (Firebase Realtime Database) ---------------- */
let roomRef=null;
async function saveState(ns){
  state=ns;
  render();
  try{
    await db.ref('rooms/'+roomCode).set(ns);
  }catch(e){
    showNotice('儲存失敗,請檢查網路後再試一次。('+errMsg(e)+')');
  }
}
/* Firebase Realtime Database silently omits keys whose value is an empty
   array/null, so fields like an empty discard pile or faceUpRemoved come
   back missing instead of []. Restore sane defaults on every read. */
function normalizeState(ns){
  if(!ns) return ns;
  ns.log = ns.log || [];
  ns.deck = ns.deck || [];
  ns.faceUpRemoved = ns.faceUpRemoved || [];
  ns.roundWinners = ns.roundWinners || [];
  ns.championIds = ns.championIds || [];
  ns.removedCard = (ns.removedCard===undefined) ? null : ns.removedCard;
  ns.currentPlayerId = (ns.currentPlayerId===undefined) ? null : ns.currentPlayerId;
  ns.players = (ns.players||[]).map(p=>{
    p.hand = p.hand || [];
    p.discardPile = p.discardPile || [];
    return p;
  });
  return ns;
}
function subscribeRoom(code){
  if(roomRef) roomRef.off();
  roomRef=db.ref('rooms/'+code);
  roomRef.on('value', snap=>{
    const ns=normalizeState(snap.val());
    if(!ns) return;
    if(JSON.stringify(ns)!==JSON.stringify(state)){
      if(state && ns.currentPlayerId!==state.currentPlayerId) localUI={stage:null,selectedCard:null,targetId:null,guess:null};
      state=ns;
      render();
    }
  });
}
function unsubscribeRoom(){
  if(roomRef){ roomRef.off(); roomRef=null; }
}


/* ---------------- Lobby actions ---------------- */
function errMsg(e){
  if(!e) return '未知錯誤';
  if(typeof e==='string') return e;
  if(e.message) return e.message;
  try{ return JSON.stringify(e); }catch(_){ return String(e); }
}
async function doCreateRoom(){
  if(!FIREBASE_READY){
    showNotice('Firebase 還沒設定好,請先在程式碼最上面填入你的 Firebase 設定。');
    return;
  }
  const nameInput=document.getElementById('nameInput');
  const name=(nameInput.value||'').trim();
  if(!name){showNotice('請先輸入你的名字');return;}
  const id=genId();
  const code=genRoomCode();
  const ns={
    status:'lobby',
    players:[{id,name,tokens:0,alive:true,protected:false,hand:[],discardPile:[],isBot:false}],
    hostId:id, deck:[], removedCard:null, faceUpRemoved:[],
    currentPlayerId:null, log:[], roundNumber:0, tokenGoal:0,
    championIds:[], roundWinners:[]
  };
  try{
    await db.ref('rooms/'+code).set(ns);
  }catch(e){
    showNotice('建立房間失敗:'+errMsg(e));
    return;
  }
  myName=name; myId=id; roomCode=code; state=ns; render();
  subscribeRoom(code);
  try{ localStorage.setItem('loveletter_session', JSON.stringify({roomCode:code,myId:id,myName:name})); }catch(e){}
  try{ localStorage.setItem('loveletter_name', name); }catch(e){}
}
async function doJoinRoom(){
  if(!FIREBASE_READY){
    showNotice('Firebase 還沒設定好,請先在程式碼最上面填入你的 Firebase 設定。');
    return;
  }
  const nameInput=document.getElementById('nameInput');
  const codeInput=document.getElementById('joinCodeInput');
  const name=(nameInput.value||'').trim();
  const code=(codeInput.value||'').trim().toUpperCase();
  if(!name){showNotice('請先輸入你的名字');return;}
  if(!code){showNotice('請輸入房間代碼');return;}
  let snap;
  try{ snap=await db.ref('rooms/'+code).get(); }
  catch(e){ showNotice('找不到這個房間,請確認代碼是否正確。('+errMsg(e)+')'); return; }
  if(!snap.exists()){ showNotice('找不到這個房間,請確認代碼是否正確。'); return; }
  const ns=normalizeState(snap.val());
  if(ns.status!=='lobby'){ showNotice('這個房間的遊戲已經開始了,無法加入。'); return; }
  if(ns.players.length>=4){ showNotice('房間已滿(最多 4 人)。'); return; }
  if(ns.players.some(p=>p.name===name)){ showNotice('這個名字已經有人用了,換一個吧。'); return; }
  const id=genId();
  ns.players.push({id,name,tokens:0,alive:true,protected:false,hand:[],discardPile:[],isBot:false});
  try{
    await db.ref('rooms/'+code).set(ns);
  }catch(e){
    showNotice('加入房間失敗:'+errMsg(e));
    return;
  }
  myId=id; myName=name; roomCode=code; state=ns; render();
  subscribeRoom(code);
  try{ localStorage.setItem('loveletter_session', JSON.stringify({roomCode:code,myId:id,myName:name})); }catch(e){}
  try{ localStorage.setItem('loveletter_name', name); }catch(e){}
}
const BOT_NAMES=['電腦對手・甲','電腦對手・乙','電腦對手・丙'];
async function doAddBot(){
  if(!state || state.players.length>=4) return;
  const ns=clone(state);
  const botCount=ns.players.filter(p=>p.isBot).length;
  const id='bot-'+genId();
  ns.players.push({id,name:BOT_NAMES[botCount]||('電腦對手 '+(botCount+1)),tokens:0,alive:true,protected:false,hand:[],discardPile:[],isBot:true});
  saveState(ns);
}
async function doRemoveBot(id){
  if(!state) return;
  const ns=clone(state);
  ns.players=ns.players.filter(p=>p.id!==id);
  saveState(ns);
}
async function doLeaveRoom(){
  try{ localStorage.removeItem('loveletter_session'); }catch(e){}
  unsubscribeRoom();
  roomCode=null; myId=null; state=null;
  localUI={stage:null,selectedCard:null,targetId:null,guess:null};
  render();
}
function enterCountdown(ns){
  ns.status='countdown';
  ns.countdownEndAt=Date.now()+3000;
  saveState(ns);
}
async function doStartGame(){
  if(!state||state.players.length<2) return;
  const ns=clone(state);
  ns.tokenGoal = ns.players.length===2?7:(ns.players.length===3?5:4);
  ns.roundNumber=1;
  ns.players.forEach(p=>p.tokens=0);
  enterCountdown(ns);
}
async function doNextRound(){
  const ns=clone(state);
  ns.roundNumber+=1;
  enterCountdown(ns);
}
async function doPlayAgain(){
  const ns=clone(state);
  ns.players.forEach(p=>p.tokens=0);
  ns.tokenGoal = ns.players.length===2?7:(ns.players.length===3?5:4);
  ns.roundNumber=1;
  ns.championIds=[];
  enterCountdown(ns);
}
async function doResetGame(){
  if(!state || state.hostId!==myId) return;
  const ns=clone(state);
  ns.players.forEach(p=>p.tokens=0);
  ns.tokenGoal = ns.players.length===2?7:(ns.players.length===3?5:4);
  ns.roundNumber=1;
  ns.championIds=[];
  enterCountdown(ns);
}
let countdownLock=false;
function checkCountdownFinish(){
  if(!state || state.status!=='countdown') return;
  if(!state.hostId || state.hostId!==myId) return;
  if(Date.now() < state.countdownEndAt) return;
  if(countdownLock) return;
  countdownLock=true;
  const ns=clone(state);
  startRound(ns);
  saveState(ns);
  setTimeout(()=>{countdownLock=false;}, 1500);
}
setInterval(()=>{ if(state && state.status==='countdown') render(); }, 350);

/* ---------------- Turn actions ---------------- */
function myPlayer(){ return state.players.find(p=>p.id===myId); }
function findP(id){ return state.players.find(p=>p.id===id); }

function doDraw(){
  if(localUI.stage) return;
  const deck=[...state.deck];
  const drawn=deck.pop();
  localUI.stage={deck, drawnCard:drawn};
  render();
}
function tempHand(){
  const me=myPlayer();
  if(!localUI.stage) return me.hand.slice();
  return me.hand.concat([localUI.stage.drawnCard]);
}
function forcedCountess(){
  const th=tempHand();
  return th.includes(7) && (th.includes(6)||th.includes(5));
}
function selectCard(v){
  if(forcedCountess() && v!==7){
    showNotice('你同時持有伯爵夫人與國王/王子,必須棄掉伯爵夫人。');
    return;
  }
  localUI.selectedCard=v; localUI.targetId=null; localUI.guess=null;
  render();
}
function cancelSelection(){
  localUI.selectedCard=null; localUI.targetId=null; localUI.guess=null;
  render();
}
function selectTarget(id){ localUI.targetId=id; render(); }
function selectGuess(n){ localUI.guess=n; render(); }

function computeValidTargets(card){
  if(card===5){
    return state.players.filter(p=>p.alive && (p.id===myId || !p.protected));
  }
  if([1,2,3,6].includes(card)){
    return state.players.filter(p=>p.alive && !p.protected && p.id!==myId);
  }
  return [];
}

function confirmPlay(){
  const card=localUI.selectedCard;
  if(!card) return;
  const needsTarget=[1,2,3,5,6].includes(card);
  const targets=computeValidTargets(card);
  if(needsTarget && targets.length>0){
    if(localUI.targetId==null){ showNotice('請先選擇目標'); return; }
    if(card===1 && localUI.guess==null){ showNotice('請選擇你要猜測的牌'); return; }
  }
  const ns=clone(state);
  ns.deck=[...localUI.stage.deck];
  const me=ns.players.find(p=>p.id===myId);
  const th=me.hand.concat([localUI.stage.drawnCard]);
  const idx=th.indexOf(card);
  th.splice(idx,1);
  me.hand=th;
  me.discardPile.push(card);
  ns.log.push(`${me.name} 出了「${cardName(card)}」。`);

  resolveEffect(ns, me, card, localUI.targetId, localUI.guess, true);
  finalizeTurnOrRoundEnd(ns);
  localUI={stage:null,selectedCard:null,targetId:null,guess:null};
  saveState(ns);
}

/* Shared effect resolver used by both human plays and bot turns.
   `actor` must already have had the played card removed from hand
   (and pushed to discardPile) before this is called. */
function resolveEffect(ns, actor, card, tId, guess, isHumanReveal){
  switch(card){
    case 1:{
      const t = tId!=null ? ns.players.find(p=>p.id===tId) : null;
      if(t){
        if(t.hand[0]===guess){
          t.alive=false;
          ns.log.push(`${actor.name} 猜測 ${t.name} 持有「${cardName(guess)}」,猜中了!${t.name} 出局。`);
        }else{
          ns.log.push(`${actor.name} 猜測 ${t.name} 持有「${cardName(guess)}」,猜錯了。`);
        }
      }else{
        ns.log.push('沒有可指定的目標,衛兵效果無效。');
      }
      break;
    }
    case 2:{
      const t = tId!=null ? ns.players.find(p=>p.id===tId) : null;
      if(t){
        ns.log.push(`${actor.name} 偷看了 ${t.name} 的手牌。`);
        if(isHumanReveal){
          showNotice(`你偷看到 ${t.name} 的手牌是:「${cardRoman(t.hand[0])} ${cardName(t.hand[0])}」`, '神父 · 偷看手牌');
        }
      }else{
        ns.log.push('沒有可指定的目標,神父效果無效。');
      }
      break;
    }
    case 3:{
      const t = tId!=null ? ns.players.find(p=>p.id===tId) : null;
      if(t){
        const myVal=actor.hand[0], tVal=t.hand[0];
        if(myVal===tVal){
          ns.log.push(`${actor.name} 與 ${t.name} 比較手牌,點數相同(「${cardName(myVal)}」),平手無事發生。`);
        }else if(myVal>tVal){
          t.alive=false;
          ns.log.push(`${actor.name}(「${cardName(myVal)}」)與 ${t.name}(「${cardName(tVal)}」)比較手牌,${t.name} 出局。`);
        }else{
          actor.alive=false;
          ns.log.push(`${actor.name}(「${cardName(myVal)}」)與 ${t.name}(「${cardName(tVal)}」)比較手牌,${actor.name} 出局。`);
        }
      }else{
        ns.log.push('沒有可指定的目標,男爵效果無效。');
      }
      break;
    }
    case 4:{
      actor.protected=true;
      ns.log.push(`${actor.name} 使用侍女,獲得保護,直到下一回合開始前都不會被指定。`);
      break;
    }
    case 5:{
      const t = tId!=null ? ns.players.find(p=>p.id===tId) : null;
      if(t){
        if(t.hand[0]===8){
          t.alive=false; t.discardPile.push(8); t.hand=[];
          ns.log.push(`${actor.name} 指定 ${t.name} 使用王子,${t.name} 被迫棄掉公主,立即出局!`);
        }else{
          const old=t.hand.pop();
          if(old!==undefined) t.discardPile.push(old);
          let newCard;
          if(ns.deck.length>0){ newCard=ns.deck.pop(); }
          else{ newCard=ns.removedCard; ns.removedCard=null; }
          t.hand=[newCard];
          ns.log.push(`${actor.name} 指定 ${t.name} 使用王子,棄掉手牌並重新抽了一張新牌。`);
        }
      }
      break;
    }
    case 6:{
      const t = tId!=null ? ns.players.find(p=>p.id===tId) : null;
      if(t){
        const tmp=actor.hand[0]; actor.hand[0]=t.hand[0]; t.hand[0]=tmp;
        ns.log.push(`${actor.name} 與 ${t.name} 交換了手牌。`);
      }else{
        ns.log.push('沒有可指定的目標,國王效果無效。');
      }
      break;
    }
    case 7:{
      ns.log.push(`${actor.name} 棄掉了伯爵夫人。`);
      break;
    }
    case 8:{
      actor.alive=false;
      ns.log.push(`${actor.name} 棄掉了公主,立即出局!`);
      break;
    }
  }
}

function finalizeTurnOrRoundEnd(ns){
  const alivePlayers=ns.players.filter(p=>p.alive);
  if(alivePlayers.length<=1){
    endRound(ns, alivePlayers);
    return;
  }
  const order=ns.players;
  let idx=order.findIndex(p=>p.id===ns.currentPlayerId);
  let next=idx;
  do{ next=(next+1)%order.length; }while(!order[next].alive);
  order[next].protected=false;
  ns.currentPlayerId=order[next].id;
  if(ns.deck.length===0){
    endRound(ns, ns.players.filter(p=>p.alive));
    return;
  }
  ns.status='playing';
}

function endRound(ns, aliveList){
  let winners;
  if(aliveList.length<=1){
    winners=aliveList.slice();
  }else{
    const maxVal=Math.max(...aliveList.map(p=>p.hand[0]));
    let candidates=aliveList.filter(p=>p.hand[0]===maxVal);
    if(candidates.length===1){
      winners=candidates;
    }else{
      const maxSum=Math.max(...candidates.map(p=>sumArr(p.discardPile)));
      winners=candidates.filter(p=>sumArr(p.discardPile)===maxSum);
    }
  }
  winners.forEach(w=>{
    const p=ns.players.find(pp=>pp.id===w.id);
    p.tokens+=1;
  });
  ns.status='roundEnd';
  ns.roundWinners=winners.map(w=>w.id);
  ns.log.push(`本輪結束。${winners.map(w=>w.name).join('、')} 獲得一枚信物。`);
  const champs=ns.players.filter(p=>p.tokens>=ns.tokenGoal);
  if(champs.length>0){
    ns.status='gameOver';
    ns.championIds=champs.map(c=>c.id);
  }
}

/* ---------------- Bot AI ---------------- */
let botLock=false;
function maybeRunBot(){
  if(!state || state.status!=='playing') return;
  if(!state.hostId || state.hostId!==myId) return; // only the host's browser drives bots
  const cur=findP(state.currentPlayerId);
  if(!cur || !cur.isBot || !cur.alive) return;
  if(botLock) return;
  botLock=true;
  setTimeout(()=>{ botLock=false; runBotTurn(); }, 3200);
}
function runBotTurn(){
  if(!state || state.status!=='playing') return;
  const curCheck=findP(state.currentPlayerId);
  if(!curCheck || !curCheck.isBot || !curCheck.alive) return;
  const ns=clone(state);
  const bot=ns.players.find(p=>p.id===ns.currentPlayerId);
  if(ns.deck.length===0){
    endRound(ns, ns.players.filter(p=>p.alive));
    saveState(ns);
    return;
  }
  const drawn=ns.deck.pop();
  let hand=bot.hand.concat([drawn]);

  const forced = hand.includes(7) && (hand.includes(6)||hand.includes(5));
  let card;
  if(forced){
    card=7;
  }else{
    let candidates=hand.slice();
    if(candidates.includes(8) && candidates.length>1){
      candidates=candidates.filter(c=>c!==8);
    }
    card=candidates[Math.floor(Math.random()*candidates.length)];
  }
  const idx=hand.indexOf(card);
  hand.splice(idx,1);
  bot.hand=hand;
  bot.discardPile.push(card);
  ns.log.push(`${bot.name} 出了「${cardName(card)}」。`);

  function targetsFor(c){
    if(c===5) return ns.players.filter(p=>p.alive && (p.id===bot.id || !p.protected));
    if([1,2,3,6].includes(c)) return ns.players.filter(p=>p.alive && !p.protected && p.id!==bot.id);
    return [];
  }
  let tId=null, guess=null;
  if([1,2,3,5,6].includes(card)){
    const targets=targetsFor(card);
    if(card===5){
      const others=targets.filter(t=>t.id!==bot.id);
      const pick = others.length>0 ? others[Math.floor(Math.random()*others.length)] : targets[0];
      tId = pick ? pick.id : null;
    }else if(targets.length>0){
      tId = targets[Math.floor(Math.random()*targets.length)].id;
    }
    if(card===1 && tId!=null){
      const opts=[2,3,4,5,6,7,8];
      guess=opts[Math.floor(Math.random()*opts.length)];
    }
  }

  resolveEffect(ns, bot, card, tId, guess, false);
  finalizeTurnOrRoundEnd(ns);
  saveState(ns);
}

  }
  const th=tempHand();
  let html=`<div class="panel"><h2>選一張出牌</h2>`;
  if(forcedCountess()) html+=`<div class="hint">你同時持有伯爵夫人與國王/王子,必須棄掉伯爵夫人。</div>`;
  html+=`<div class="cards-row">`;
  th.forEach(v=>{

    const sel=localUI.selectedCard===v?' selected':'';
    html+=`<div class="card${sel}${locked?' locked':''}" onclick="${locked?'':'selectCard('+v+')'}">
      <div class="roman display">${cardRoman(v)}</div>
      <div class="cname">${cardName(v)}</div>
      <div class="cdesc">${cardDesc(v)}</div>
    </div>`;
  });
  html+=`</div>`;

  if(localUI.selectedCard!=null){
    const card=localUI.selectedCard;
    const needsTarget=[1,2,3,5,6].includes(card);
    const targets=computeValidTargets(card);
    if(needsTarget){
      if(targets.length===0){
        html+=`<div class="hint mt8">目前沒有可指定的目標,這個效果將會無效。</div>`;
      }else{
        html+=`<div class="hint mt8">選擇目標:</div><div class="target-grid">`;
        targets.forEach(t=>{
          const sel=localUI.targetId===t.id?' sel':'';
          html+=`<div class="pill${sel}" onclick="selectTarget('${t.id}')">${escapeHtml(t.name)}${t.id===myId?'(自己)':''}</div>`;
        });
        html+=`</div>`;
        if(card===1 && localUI.targetId!=null){
          html+=`<div class="hint">猜測對方手牌:</div><div class="guess-grid">`;
          for(let n=2;n<=8;n++){
            const sel=localUI.guess===n?' sel':'';
            html+=`<div class="guess-pill${sel}" onclick="selectGuess(${n})">${cardRoman(n)} ${cardName(n)}</div>`;
          }
          html+=`</div>`;
        }
      }
    }
    const canConfirm = !needsTarget || targets.length===0 || (localUI.targetId!=null && (card!==1 || localUI.guess!=null));
    html+=`<div class="btn-row mt14">
      <div class="btn secondary" onclick="cancelSelection()">重新選擇</div>
      <div class="btn${canConfirm?'':' disabled'}" onclick="${canConfirm?'confirmPlay()':''}">確認出牌</div>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function renderRoundEnd(){
  const winners=state.roundWinners.map(id=>findP(id)).filter(Boolean);
  const isHost=state.hostId===myId;
  let html=`<div class="panel center-text">
    <h2 style="border:none;">本輪結算</h2>
    <div style="color:var(--gold-light);font-size:18px;margin-bottom:8px;">${winners.map(w=>escapeHtml(w.name)).join('、')} 獲得一枚信物</div>
  </div>`;
  html+=`<div class="panel"><h2>各位的手牌</h2>`;
  state.players.forEach(p=>{
    html+=`<div class="player-row"><span>${escapeHtml(p.name)}${!p.alive?'(已出局)':''}</span><span>${p.hand.length?cardRoman(p.hand[0])+' '+cardName(p.hand[0]):'—'}</span></div>`;
  });
  html+=`</div>`;
  html+=renderPlayerBoard();
  html+=`<div class="panel center-text">
    ${isHost?`<div class="btn full" onclick="doNextRound()">下一輪</div>`:`<div class="hint">等待房主開始下一輪…</div>`}
  </div>`;
  html+=renderLog();
  return html;
}

function renderGameOver(){
  const champs=state.championIds.map(id=>findP(id)).filter(Boolean);
  const isHost=state.hostId===myId;
  let html=`<div class="panel">
    <div class="champion-banner">${champs.map(c=>escapeHtml(c.name)).join('、')} 贏得了這場賭局</div>
  </div>`;
  html+=`<div class="panel"><h2>最終信物數</h2>`;
  state.players.slice().sort((a,b)=>b.tokens-a.tokens).forEach(p=>{
    let dots=''; for(let i=0;i<p.tokens;i++) dots+='<span class="token-dot"></span>';
    html+=`<div class="player-row"><span>${escapeHtml(p.name)}</span><span class="tokens">${dots}</span></div>`;
  });
  html+=`</div>`;
  html+=`<div class="panel center-text">
    ${isHost?`<div class="btn full" onclick="doPlayAgain()">重新開始</div>`:`<div class="hint">等待房主重新開始…</div>`}
    <div class="mt8"><span class="btn secondary" onclick="doLeaveRoom()">離開房間</span></div>
  </div>`;
  return html;
}

function renderRoomMenu(){
  const isHost = state && state.hostId===myId;
  const canReset = state && ['playing','roundEnd','gameOver'].includes(state.status);
  return `<div class="modal-overlay" onclick="if(event.target===this) toggleRoomMenu()">
    <div class="modal-box">
      <h3>房間選項</h3>
      ${roomCode?`<p class="hint">目前房間代碼:${escapeHtml(roomCode)}</p>`:''}
      ${isHost && canReset ? `<div class="btn full mt8" onclick="toggleRoomMenu();doResetGame();">重新開始整局</div>` : ''}
      <div class="btn full secondary mt8" onclick="toggleRoomMenu();doLeaveRoom();">離開房間</div>
      <div class="btn full secondary mt8" onclick="toggleRoomMenu()">取消</div>
    </div>
  </div>`;
}
function renderRulesModal(){
  let items='';
  for(let v=1;v<=8;v++){
    items+=`<div class="rule-item"><b>${cardRoman(v)} ${cardName(v)}</b>（${CARDS[v].count} 張）<br>${cardDesc(v)}</div>`;
  }
  return `<div class="modal-overlay" onclick="if(event.target===this) toggleRules()">
    <div class="modal-box">
      <h3>遊戲規則</h3>
      <p style="font-size:13px;">目標:在每輪結束時存活,或手牌點數最高,就能贏得一枚信物。先集滿信物的人獲勝(2人:7枚 / 3人:5枚 / 4人:4枚)。每回合先抽一張牌,手上會有兩張,選一張出牌並執行效果,留下另一張。</p>
      ${items}
      <div class="btn full mt14" onclick="toggleRules()">關閉</div>
    </div>
  </div>`;
}

/* ---------------- Init ---------------- */
async function init(){
  if(!FIREBASE_READY){
    render();
    return;
  }
  try{
    const sess=localStorage.getItem('loveletter_session');
    if(sess){
      const data=JSON.parse(sess);
      try{
        const snap=await db.ref('rooms/'+data.roomCode).get();
        if(snap.exists()){
          const ns=normalizeState(snap.val());
          if(ns.players.find(p=>p.id===data.myId)){
            roomCode=data.roomCode; myId=data.myId; myName=data.myName;
            state=ns; render(); subscribeRoom(data.roomCode); return;
          }
        }
      }catch(e){}
    }
  }catch(e){}
  try{
    const n=localStorage.getItem('loveletter_name');
    if(n) myName=n;
  }catch(e){}
  render();
}
init();
</script>
</body>
</html>
